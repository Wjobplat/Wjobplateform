<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche d'emplois - Job Application Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🎯</div>
                <div class="logo-text">JobFlow</div>
            </div>

            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">
                            <span class="nav-icon">📊</span>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="jobs.html" class="nav-link active">
                            <span class="nav-icon">🔍</span>
                            <span>Recherche d'emplois</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="applications.html" class="nav-link">
                            <span class="nav-icon">📝</span>
                            <span>Candidatures</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="recruiters.html" class="nav-link">
                            <span class="nav-icon">👥</span>
                            <span>Recruteurs</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <span class="nav-icon">⚙️</span>
                            <span>Paramètres</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header fade-in">
                <h1 class="page-title">Recherche d'emplois</h1>
                <p class="page-subtitle">Découvrez les meilleures opportunités pour votre profil</p>
            </header>

            <!-- Filters -->
            <div class="filters-container fade-in">
                <div class="filters-grid">
                    <div class="filter-group">
                        <label class="filter-label">Recherche</label>
                        <input type="text" class="filter-input" id="filter-search"
                            placeholder="Titre, entreprise, compétences...">
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">Localisation</label>
                        <select class="filter-select" id="filter-location">
                            <option value="">Toutes</option>
                            <option value="remote">Remote</option>
                            <option value="paris">Paris</option>
                            <option value="lyon">Lyon</option>
                            <option value="bordeaux">Bordeaux</option>
                            <option value="nantes">Nantes</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">Type de contrat</label>
                        <select class="filter-select" id="filter-contract">
                            <option value="">Tous</option>
                            <option value="CDI">CDI</option>
                            <option value="CDD">CDD</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Stage">Stage</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">Source</label>
                        <select class="filter-select" id="filter-source">
                            <option value="">Toutes</option>
                            <option value="LinkedIn">LinkedIn</option>
                            <option value="Indeed">Indeed</option>
                            <option value="Welcome to the Jungle">Welcome to the Jungle</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label class="filter-label">Compatibilité min.</label>
                        <select class="filter-select" id="filter-compatibility">
                            <option value="0">Toutes</option>
                            <option value="90">90%+</option>
                            <option value="80">80%+</option>
                            <option value="70">70%+</option>
                        </select>
                    </div>

                    <div class="filter-group" style="display: flex; align-items: flex-end;">
                        <button class="btn btn-secondary" onclick="resetFilters()" style="width: 100%;">
                            Réinitialiser
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results Header -->
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-xl);">
                <div>
                    <span style="color: var(--color-text-secondary);">
                        <span id="results-count">0</span> offres trouvées
                    </span>
                </div>
                <div>
                    <select class="filter-select" id="sort-by" style="width: auto;">
                        <option value="compatibility">Compatibilité</option>
                        <option value="date">Date de publication</option>
                        <option value="company">Entreprise</option>
                    </select>
                </div>
            </div>

            <!-- Job Grid -->
            <div class="job-grid" id="job-grid">
                <!-- Job cards will be inserted here -->
            </div>
        </main>
    </div>

    <!-- Job Detail Modal -->
    <div id="job-modal" class="modal hidden">
        <div class="modal-overlay" onclick="closeJobModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-job-title"></h2>
                <button class="modal-close" onclick="closeJobModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-job-content">
                <!-- Job details will be inserted here -->
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="jobs.js"></script>
</body>

</html>
