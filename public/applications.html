<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>W-JOB — Démarrer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    .hidden{display:none!important}
    :root{
      --em:#10b981;--em-l:#34d399;--em-d:#059669;--teal:#14b8a6;
      --bg:#030d12;
      --glass:rgba(255,255,255,.05);--gb:rgba(16,185,129,.18);--gh:rgba(255,255,255,.09);
      --text:#f0fdf8;--muted:#6b9e8e;--dim:#a3c4bc;
    }

    /* ── LIGHT MODE ── */
    [data-theme="light"]{
      --bg:#f0fdf8;--glass:rgba(0,0,0,.04);--gb:rgba(16,185,129,.18);--gh:rgba(0,0,0,.06);
      --text:#0f172a;--muted:#4b7a6c;--dim:#2d5c4e;
    }
    [data-theme="light"] body::before{
      background:
        radial-gradient(ellipse 70% 60% at 50% -15%,rgba(16,185,129,.1) 0%,transparent 65%),
        linear-gradient(160deg,#f0fdf8 0%,#e5f7f0 100%)
    }
    [data-theme="light"] .topnav{background:rgba(240,253,248,.9);border-bottom-color:rgba(16,185,129,.22)}
    [data-theme="light"] .icon-btn{background:rgba(255,255,255,.65);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .nav-link{color:var(--dim)}
    [data-theme="light"] .nav-link:hover{background:rgba(0,0,0,.05);color:var(--text)}
    [data-theme="light"] .nav-link.active{color:var(--em);background:rgba(16,185,129,.1)}
    [data-theme="light"] .hero-card{background:rgba(255,255,255,.5);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .wz-bar{background:rgba(0,0,0,.07)}
    [data-theme="light"] .wz-step-card{background:rgba(255,255,255,.7);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .wz-step-card.wz-active{background:rgba(16,185,129,.08);border-color:var(--em)}
    [data-theme="light"] .wz-step-card.wz-done{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.3)}
    [data-theme="light"] .dz-card{background:rgba(255,255,255,.7);border-color:rgba(16,185,129,.3)}
    [data-theme="light"] .dz-cta{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(20,184,166,.08));border-color:rgba(16,185,129,.35);color:var(--em-d)}
    [data-theme="light"] .dz-cta:hover{background:linear-gradient(135deg,rgba(16,185,129,.25),rgba(20,184,166,.15))}
    [data-theme="light"] .dz-badge{background:rgba(255,255,255,.6);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .fp-doc{background:linear-gradient(145deg,rgba(16,185,129,.1),rgba(20,184,166,.05));border-color:rgba(16,185,129,.3)}
    [data-theme="light"] .fp-badge-ready{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)}
    [data-theme="light"] .fp-card{background:transparent}
    [data-theme="light"] .panel-card{background:rgba(255,255,255,.7);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .result-card{background:rgba(255,255,255,.6);border-color:rgba(16,185,129,.18)}
    [data-theme="light"] .result-card:hover{background:rgba(255,255,255,.95)}
    [data-theme="light"] .result-card.selected{background:rgba(16,185,129,.07);border-color:var(--em)}
    [data-theme="light"] .email-card{background:rgba(255,255,255,.7);border-color:rgba(16,185,129,.18)}
    [data-theme="light"] .email-body{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.09)}
    [data-theme="light"] .step-divider{border-color:rgba(0,0,0,.09)}
    [data-theme="light"] .stat-pill{background:rgba(255,255,255,.65);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .hero-title{background:linear-gradient(135deg,#0f2d1f 0%,var(--em-d) 55%,#0d9488 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    [data-theme="light"] .footer-bar{border-color:rgba(0,0,0,.09);color:var(--muted)}
    [data-theme="light"] .footer-bar a{color:var(--muted)}

    .icon-sun{display:block}.icon-moon{display:none}
    [data-theme="light"] .icon-sun{display:none}
    [data-theme="light"] .icon-moon{display:block}

    /* Transitions */
    body{transition:background .45s ease,color .45s ease}
    .topnav{transition:background .45s ease,border-color .45s ease}
    .hero-card,.wz-step-card,.dz-card,.panel-card,.result-card,.email-card{transition:background .4s ease,border-color .4s ease}

    /* Flash */
    #theme-flash{position:fixed;inset:0;z-index:9999;pointer-events:none}
    #theme-flash.flash-dark{animation:fOut .38s ease forwards;background:rgba(0,0,0,.15)}
    #theme-flash.flash-light{animation:fOut .38s ease forwards;background:rgba(255,255,255,.2)}
    @keyframes fOut{0%{opacity:1}100%{opacity:0}}

    html{scroll-behavior:smooth}
    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 80% 60% at 50% -5%,rgba(16,185,129,.15) 0%,transparent 60%),
        radial-gradient(ellipse 40% 40% at 5% 60%,rgba(20,184,166,.07) 0%,transparent 50%),
        radial-gradient(ellipse 35% 35% at 95% 85%,rgba(16,185,129,.06) 0%,transparent 50%),
        linear-gradient(180deg,#030d12 0%,#050f14 100%)
    }

    /* ── TOP NAV ── */
    .topnav{
      position:sticky;top:0;z-index:100;height:60px;padding:0 2rem;
      display:flex;align-items:center;justify-content:space-between;gap:1.5rem;
      background:rgba(3,13,18,.8);backdrop-filter:blur(28px) saturate(1.5);
      border-bottom:1px solid rgba(16,185,129,.12);
    }
    .nav-logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;flex-shrink:0}
    .nav-logo-icon{width:32px;height:32px;flex-shrink:0}
    .nav-logo-text{font-size:1.2rem;font-weight:900;letter-spacing:-.5px;
      background:linear-gradient(135deg,var(--em-l),var(--teal));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-links{display:flex;align-items:center;gap:.25rem;flex:1;justify-content:center}
    .nav-link{
      display:flex;align-items:center;gap:.45rem;
      padding:.42rem .85rem;border-radius:8px;font-size:.85rem;font-weight:500;
      color:var(--dim);text-decoration:none;transition:all .2s;position:relative;
      white-space:nowrap;
    }
    .nav-link svg{width:15px;height:15px;stroke-width:2;flex-shrink:0}
    .nav-link:hover{color:var(--text);background:var(--gh)}
    .nav-link.active{color:var(--em-l);background:rgba(16,185,129,.12)}
    .nav-link .badge{background:var(--em-d);color:#fff;font-size:.6rem;font-weight:700;padding:.1rem .42rem;border-radius:999px;line-height:1.4}
    .nav-right{display:flex;align-items:center;gap:.55rem;flex-shrink:0}
    .icon-btn{
      width:36px;height:36px;border-radius:9px;
      background:var(--glass);border:1px solid var(--gb);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .2s;color:var(--dim);
    }
    .icon-btn svg{width:16px;height:16px;stroke-width:1.8}
    .icon-btn:hover{background:var(--gh);color:var(--em-l);border-color:rgba(16,185,129,.35)}
    .avatar{
      width:34px;height:34px;border-radius:50%;
      background:linear-gradient(135deg,var(--em-d),var(--em));
      display:flex;align-items:center;justify-content:center;
      font-size:.7rem;font-weight:700;color:#fff;cursor:pointer;
      box-shadow:0 0 16px rgba(16,185,129,.3);transition:box-shadow .2s;
    }
    .avatar:hover{box-shadow:0 0 26px rgba(16,185,129,.5)}

    /* ── PAGE ── */
    .page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 2rem 4rem}

    /* Entrance */
    .fi{opacity:0;transform:translateY(20px);animation:fadeUp .6s cubic-bezier(.16,1,.3,1) forwards}
    .fi1{animation-delay:.05s}.fi2{animation-delay:.14s}.fi3{animation-delay:.23s}.fi4{animation-delay:.32s}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    /* ── HERO ── */
    .hero{
      text-align:center;padding:7rem 1.5rem 5rem;
      position:relative;overflow:hidden;
    }
    .hero canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    .hero::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 80% 70% at 50% 0%,rgba(16,185,129,.28) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%,rgba(20,184,166,.1) 0%,transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 90%,rgba(16,185,129,.08) 0%,transparent 55%);
    }
    .hero::after{
      content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:60%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(16,185,129,.4),transparent);
      pointer-events:none;
    }
    .hero-inner{position:relative;z-index:1;max-width:680px;margin:0 auto}

    /* Sparkles */
    .sp{position:absolute;color:var(--em-l);pointer-events:none;opacity:.35;animation:spFloat 5s ease-in-out infinite}
    .sp:nth-child(1){top:10%;left:6%;animation-delay:0s;font-size:1.2rem}
    .sp:nth-child(2){top:15%;right:7%;animation-delay:1.6s;font-size:1.5rem}
    .sp:nth-child(3){top:65%;left:4%;animation-delay:.9s;font-size:.8rem}
    .sp:nth-child(4){top:55%;right:5%;animation-delay:2.5s;font-size:1.2rem}
    .sp:nth-child(5){bottom:20%;left:20%;animation-delay:1.8s;font-size:.75rem}
    @keyframes spFloat{0%,100%{transform:translateY(0) rotate(0deg);opacity:.35}50%{transform:translateY(-14px) rotate(22deg);opacity:.65}}

    /* Title */
    .hero-title{
      font-size:clamp(2.2rem,4.5vw,3.4rem);font-weight:900;line-height:1.08;
      letter-spacing:-.05em;margin-bottom:1.4rem;
      background:linear-gradient(160deg,#ffffff 0%,#e2fdf2 25%,var(--em-l) 62%,#14b8a6 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 50px rgba(16,185,129,.25));
    }
    .hero-sub{
      font-size:1.05rem;color:var(--muted);line-height:1.75;
      max-width:440px;margin:0 auto 2.75rem;
    }

    /* CTAs */
    .hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3.5rem}

    /* Buttons */
    .btn-em{
      display:inline-flex;align-items:center;gap:.6rem;
      background:linear-gradient(135deg,var(--em-d) 0%,var(--em) 60%,#34d399 100%);
      color:#fff;font-size:1rem;font-weight:700;letter-spacing:.01em;
      padding:.9rem 2.2rem;border-radius:13px;border:none;cursor:pointer;
      font-family:inherit;
      box-shadow:0 4px 32px rgba(16,185,129,.5),0 1px 0 rgba(255,255,255,.15) inset;
      transition:all .25s cubic-bezier(.16,1,.3,1);
    }
    .btn-em:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 44px rgba(16,185,129,.65),0 1px 0 rgba(255,255,255,.15) inset}
    .btn-em:active{transform:translateY(0) scale(1)}
    .btn-ghost{
      display:inline-flex;align-items:center;gap:.6rem;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);
      color:var(--text);font-size:1rem;font-weight:600;
      padding:.9rem 2rem;border-radius:13px;cursor:pointer;
      font-family:inherit;text-decoration:none;backdrop-filter:blur(8px);
      transition:all .2s;
    }
    .btn-ghost:hover{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.5);color:var(--em-l)}
    .btn-danger{
      display:inline-flex;align-items:center;gap:.4rem;
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);
      color:#fca5a5;font-size:.84rem;font-weight:600;
      padding:.55rem .95rem;border-radius:9px;cursor:pointer;
      font-family:inherit;transition:all .2s;
    }
    .btn-danger:hover{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.38)}

    /* Stats pills */
    .hero-stats{
      display:flex;justify-content:center;flex-wrap:wrap;gap:.75rem;
      max-width:860px;margin:0 auto;width:100%;position:relative;z-index:1;
    }
    .stat-pill{
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
      border-radius:14px;padding:18px 20px;text-align:center;flex:1;
      transition:all .25s;cursor:default;backdrop-filter:blur(10px);
    }
    .stat-pill:hover{
      background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3);
      transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.12);
    }
    .stat-icon{
      width:38px;height:38px;margin:0 auto 10px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);
    }
    .stat-icon svg{width:18px;height:18px;stroke:var(--em-l);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* icon animations */
    @keyframes boltFlash{0%,100%{opacity:1;filter:drop-shadow(0 0 0 transparent)}50%{opacity:.5;filter:drop-shadow(0 0 6px var(--em-l))}}
    @keyframes spinTarget{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes starPulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.3) rotate(180deg)}}
    @keyframes mailBounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}70%{transform:translateY(2px)}}

    .stat-icon.si-bolt svg{animation:boltFlash 2.2s ease-in-out infinite}
    .stat-icon.si-target svg{animation:spinTarget 4s linear infinite}
    .stat-icon.si-star svg{animation:starPulse 3s ease-in-out infinite}
    .stat-icon.si-mail svg{animation:mailBounce 2.8s ease-in-out infinite}

    .stat-pill:hover .stat-icon{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4)}

    .stat-num{
      font-size:1.65rem;font-weight:900;line-height:1;
      background:linear-gradient(135deg,#fff 0%,var(--em-l) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .stat-label{font-size:.65rem;color:var(--muted);font-weight:600;margin-top:5px;letter-spacing:.05em;text-transform:uppercase}

    /* ── WIZARD STEPS ── */
    .wizard-wrap{margin-bottom:2rem}

    /* 4-column step cards */
    .wz-grid{
      display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;
      margin-bottom:1.25rem;
    }
    .wz-step-card{
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      border-radius:16px;padding:1rem 1rem .85rem;
      cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);
      position:relative;overflow:hidden;
      opacity:.45;pointer-events:none;
    }
    .wz-step-card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(16,185,129,.04) 0%,transparent 60%);
      opacity:0;transition:opacity .3s;
    }
    .wz-step-card.wz-done{opacity:.65;pointer-events:auto}
    .wz-step-card.wz-done:hover{opacity:1;border-color:rgba(16,185,129,.3);transform:translateY(-2px)}
    .wz-step-card.wz-active{
      opacity:1;pointer-events:auto;
      background:rgba(16,185,129,.08);
      border-color:rgba(16,185,129,.4);
      box-shadow:0 0 0 1px rgba(16,185,129,.15),0 8px 28px rgba(16,185,129,.12);
    }
    .wz-step-card.wz-active::before{opacity:1}
    .wz-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
    .wz-num{
      width:30px;height:30px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.78rem;font-weight:800;
      background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:var(--muted);
      transition:all .3s;flex-shrink:0;
    }
    .wz-step-card.wz-active .wz-num{
      background:var(--em);border-color:var(--em);color:#fff;
      box-shadow:0 0 0 3px rgba(16,185,129,.22);
    }
    .wz-step-card.wz-done .wz-num{
      background:rgba(16,185,129,.16);border-color:var(--em);color:var(--em-l);
    }
    .wz-icon{
      width:32px;height:32px;border-radius:9px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:center;color:var(--muted);
      transition:all .3s;
    }
    .wz-icon svg{width:15px;height:15px;stroke-width:1.8}
    .wz-step-card.wz-active .wz-icon{
      background:rgba(16,185,129,.14);border-color:rgba(16,185,129,.28);color:var(--em-l);
    }
    .wz-step-card.wz-done .wz-icon{
      background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.22);color:var(--em-l);
    }
    .wz-card-label{font-size:.82rem;font-weight:700;color:var(--dim);line-height:1.2;margin-bottom:.2rem}
    .wz-step-card.wz-active .wz-card-label{color:var(--em-l)}
    .wz-step-card.wz-done .wz-card-label{color:var(--em-l);opacity:.75}
    .wz-card-sub{font-size:.68rem;color:var(--muted)}

    /* Progress bar */
    .wz-bar{height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden}
    .wz-bar-fill{height:100%;background:linear-gradient(90deg,var(--em-d),var(--em-l));border-radius:999px;width:0%;transition:width .5s cubic-bezier(.16,1,.3,1)}

    /* ── STEP PANELS ── */
    .step-panel{display:none}
    .step-panel.active{display:block;animation:sUp .4s cubic-bezier(.16,1,.3,1) both}
    @keyframes sUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    /* ── STEP 1: DROPZONE ── */
    .dz-card{
      border-radius:24px;
      background:rgba(255,255,255,.025);
      border:1px solid rgba(16,185,129,.18);
      padding:0;cursor:pointer;
      position:relative;overflow:hidden;
      transition:all .35s cubic-bezier(.16,1,.3,1);
    }
    /* Dot grid pattern */
    .dz-card::before{
      content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
      background-image:radial-gradient(rgba(16,185,129,.13) 1px,transparent 1px);
      background-size:28px 28px;
      mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 0%,transparent 100%);
      -webkit-mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 0%,transparent 100%);
      transition:opacity .35s;
    }
    /* Bottom glow */
    .dz-card::after{
      content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 60% 50% at 50% 110%,rgba(16,185,129,.1) 0%,transparent 65%);
      transition:opacity .35s;opacity:.7;
    }
    .dz-card:hover,.dz-card.dragover{
      border-color:rgba(16,185,129,.5);
      background:rgba(16,185,129,.03);
      box-shadow:0 0 0 1px rgba(16,185,129,.18),0 20px 60px rgba(16,185,129,.12);
    }
    .dz-card:hover::after,.dz-card.dragover::after{opacity:1.5}

    /* Inner wrapper */
    .dz-inner{
      position:relative;z-index:1;
      display:flex;flex-direction:column;align-items:center;
      padding:3.5rem 2rem 2.75rem;text-align:center;
    }

    /* Upload orb */
    .dz-orb{
      width:96px;height:96px;border-radius:50%;
      background:linear-gradient(145deg,rgba(16,185,129,.14),rgba(20,184,166,.06));
      border:1px solid rgba(16,185,129,.24);
      display:flex;align-items:center;justify-content:center;
      position:relative;margin-bottom:1.85rem;
      box-shadow:0 0 0 14px rgba(16,185,129,.04),0 0 0 28px rgba(16,185,129,.018);
      animation:orbPulse 3.2s ease-in-out infinite;
    }
    .dz-orb::before{
      content:'';position:absolute;inset:-14px;border-radius:50%;
      border:1px solid rgba(16,185,129,.1);
      animation:ringPulse 3.2s ease-in-out infinite;
    }
    .dz-orb::after{
      content:'';position:absolute;inset:-28px;border-radius:50%;
      border:1px dashed rgba(16,185,129,.06);
      animation:ringPulse 3.2s ease-in-out infinite .4s;
    }
    @keyframes orbPulse{
      0%,100%{box-shadow:0 0 0 14px rgba(16,185,129,.04),0 0 0 28px rgba(16,185,129,.018);transform:scale(1)}
      50%{box-shadow:0 0 0 18px rgba(16,185,129,.07),0 0 0 36px rgba(16,185,129,.03);transform:scale(1.025)}
    }
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.09);opacity:.55}}
    .dz-orb svg{width:36px;height:36px;stroke-width:1.5;color:var(--em-l);position:relative;z-index:1}
    .dz-card:hover .dz-orb{
      animation-play-state:paused;
      background:linear-gradient(145deg,rgba(16,185,129,.22),rgba(20,184,166,.12));
      border-color:rgba(16,185,129,.42);
      box-shadow:0 0 0 14px rgba(16,185,129,.07),0 0 0 28px rgba(16,185,129,.03);
    }

    .dz-title{font-size:1.45rem;font-weight:800;color:var(--text);margin-bottom:.55rem;letter-spacing:-.03em}
    .dz-sub{font-size:.88rem;color:var(--muted);margin-bottom:2rem;line-height:1.65;max-width:340px}

    .dz-cta{
      display:inline-flex;align-items:center;gap:.55rem;
      padding:.68rem 1.6rem;border-radius:12px;
      background:linear-gradient(135deg,rgba(16,185,129,.16),rgba(20,184,166,.08));
      border:1px solid rgba(16,185,129,.3);
      color:var(--em-l);font-size:.88rem;font-weight:700;cursor:pointer;
      transition:all .22s cubic-bezier(.16,1,.3,1);letter-spacing:.01em;
    }
    .dz-cta:hover{
      background:linear-gradient(135deg,rgba(16,185,129,.26),rgba(20,184,166,.16));
      border-color:rgba(16,185,129,.5);
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(16,185,129,.2);
    }
    .dz-cta svg{width:15px;height:15px;stroke-width:2.2;flex-shrink:0}

    .dz-badges{
      display:flex;align-items:center;gap:.5rem;margin-top:1.75rem;flex-wrap:wrap;justify-content:center;
    }
    .dz-badge{
      display:inline-flex;align-items:center;gap:.32rem;
      font-size:.7rem;color:var(--muted);padding:.3rem .75rem;border-radius:999px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
      letter-spacing:.02em;
    }
    .dz-badge svg{width:10px;height:10px;flex-shrink:0;opacity:.65}

    /* ── FILE PREVIEW ── */
    .fp-card{
      position:relative;z-index:1;
      display:grid;grid-template-columns:auto 1fr;gap:2rem;align-items:center;
      padding:2.25rem 2.5rem;
    }
    .fp-doc{
      width:80px;height:100px;border-radius:14px;
      background:linear-gradient(145deg,rgba(16,185,129,.13),rgba(20,184,166,.06));
      border:1px solid rgba(16,185,129,.25);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.45rem;flex-shrink:0;position:relative;
      box-shadow:0 8px 32px rgba(16,185,129,.14),0 2px 8px rgba(0,0,0,.2);
    }
    /* Folded corner */
    .fp-doc::before{
      content:'';position:absolute;top:0;right:0;
      width:0;height:0;
      border-style:solid;border-width:0 16px 16px 0;
      border-color:transparent rgba(16,185,129,.35) transparent transparent;
      border-radius:0 14px 0 0;
    }
    .fp-doc-icon{color:var(--em-l)}
    .fp-doc-icon svg{width:24px;height:24px;stroke-width:1.5}
    .fp-doc-ext{font-size:.58rem;font-weight:800;letter-spacing:.12em;color:var(--em);text-transform:uppercase}
    .fp-check{
      position:absolute;top:-7px;right:-7px;
      width:22px;height:22px;border-radius:50%;
      background:linear-gradient(135deg,var(--em-d),var(--em));
      border:2px solid var(--bg);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 10px rgba(16,185,129,.45);
    }
    .fp-check svg{width:10px;height:10px;stroke-width:3;color:#fff}

    .fp-info{display:flex;flex-direction:column;gap:1rem}
    .fp-badge-ready{
      display:inline-flex;align-items:center;gap:.4rem;
      font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      color:var(--em);padding:.28rem .8rem;border-radius:999px;
      background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.24);
      width:fit-content;
    }
    .fp-badge-ready svg{width:9px;height:9px;stroke-width:2.8;flex-shrink:0}
    .fp-name2{font-size:1.05rem;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.3}
    .fp-meta{display:flex;align-items:center;gap:.55rem;font-size:.78rem;color:var(--muted);margin-top:2px}
    .fp-meta-dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.4}
    .fp-actions2{display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}

    @media(max-width:560px){
      .fp-card{grid-template-columns:1fr;gap:1.25rem;padding:1.75rem 1.5rem}
      .fp-doc{width:64px;height:80px}
    }

    /* ── STEP 2: ANALYSIS ── */
    .panel-card{
      max-width:660px;margin:0 auto;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
      border-radius:20px;padding:2.5rem;
      backdrop-filter:blur(20px);
    }
    .spin-wrap{display:flex;flex-direction:column;align-items:center;gap:1.25rem;text-align:center;padding:.5rem 0}
    .ring-wrap{width:68px;height:68px;position:relative}
    .ring-wrap svg{width:68px;height:68px;transform:rotate(-90deg)}
    .ring-wrap circle{fill:none;stroke-width:4}
    .ring-track{stroke:rgba(255,255,255,.07)}
    .ring-fill{stroke:var(--em);stroke-linecap:round;stroke-dasharray:188;stroke-dashoffset:188;transition:stroke-dashoffset .6s cubic-bezier(.16,1,.3,1)}
    .spin-label{font-size:1rem;font-weight:700;color:var(--text)}
    .spin-sub{font-size:.83rem;color:var(--muted);margin-top:.2rem}
    .prog-track{width:100%;max-width:320px;height:4px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-top:.4rem}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--em-d),var(--em-l));border-radius:999px;width:0%;transition:width .5s cubic-bezier(.16,1,.3,1)}
    .profile-box{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);border-radius:14px;padding:1.2rem;margin-bottom:1.2rem}
    .profile-box-title{display:flex;align-items:center;gap:7px;font-size:.8rem;font-weight:700;color:var(--em-l);margin-bottom:.85rem}
    .profile-box-title svg{width:14px;height:14px;flex-shrink:0}

    /* ── STEP 3: RESULTS ── */
    .sr-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.1rem;flex-wrap:wrap;gap:.85rem}
    .sr-title{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:.2rem}
    .sr-sub{font-size:.78rem;color:var(--muted)}
    #results-count{font-size:.78rem;color:var(--muted)}

    /* Filter pills */
    .sr-filters{display:flex;gap:.45rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .sr-pill{
      display:inline-flex;align-items:center;gap:.32rem;
      padding:.32rem .85rem;border-radius:999px;font-size:.75rem;font-weight:600;cursor:pointer;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
      color:var(--muted);transition:all .18s;white-space:nowrap;
    }
    .sr-pill:hover{background:rgba(255,255,255,.08);color:var(--dim);border-color:rgba(255,255,255,.15)}
    .sr-pill.active{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--em-l)}
    .sr-pill svg{width:11px;height:11px;flex-shrink:0}

    /* Results grid — 2 colonnes */
    #results-grid{
      display:grid;grid-template-columns:repeat(2,1fr);
      gap:.85rem;margin-bottom:1.5rem;
    }
    @media(max-width:680px){#results-grid{grid-template-columns:1fr}}

    /* Job card */
    .result-card{
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
      border-radius:16px;padding:1.2rem 1.25rem;cursor:pointer;
      transition:all .22s cubic-bezier(.16,1,.3,1);
      display:flex;flex-direction:column;gap:0;
    }
    .result-card:hover{border-color:rgba(16,185,129,.3);background:rgba(255,255,255,.055);transform:translateY(-2px);box-shadow:0 8px 32px rgba(16,185,129,.09)}
    .result-card.selected{border-color:var(--em);background:rgba(16,185,129,.06);box-shadow:0 0 0 3px rgba(16,185,129,.12)}
    .count-badge{background:rgba(255,255,255,.18);border-radius:999px;padding:2px 8px;font-size:.73rem;font-weight:700;margin-left:5px}

    /* Empty state */
    .sr-empty{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:3.5rem 1rem;text-align:center;gap:1rem;
    }
    .sr-empty-orb{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(145deg,rgba(16,185,129,.1),rgba(20,184,166,.05));
      border:1px solid rgba(16,185,129,.2);
      display:flex;align-items:center;justify-content:center;color:var(--muted);
      margin-bottom:.5rem;
    }
    .sr-empty-orb svg{width:32px;height:32px;stroke-width:1.4}
    .sr-empty h4{font-size:1rem;font-weight:800;color:var(--text);letter-spacing:-.02em}
    .sr-empty p{font-size:.84rem;color:var(--muted);line-height:1.65;max-width:300px}

    /* Skeleton loading cards */
    .sk-card{
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      border-radius:16px;padding:1.2rem 1.25rem;
    }
    .sk-line{background:rgba(255,255,255,.07);border-radius:6px;animation:skPulse 1.5s ease-in-out infinite}
    @keyframes skPulse{0%,100%{opacity:.5}50%{opacity:1}}

    /* ── STEP 4: EMAILS ── */
    .email-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.2rem;margin-bottom:1rem}
    .email-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
    .email-body{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.9rem;font-size:.83rem;line-height:1.75;white-space:pre-wrap;color:var(--dim);min-height:80px;margin-bottom:.75rem}
    .email-actions{display:flex;gap:.5rem;justify-content:flex-end}

    /* ── STEP NAV ── */
    .step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1.25rem}
    .step-divider{border-top:1px solid rgba(255,255,255,.07)}

    /* Loading generic */
    .load-center{display:flex;flex-direction:column;align-items:center;gap:1.25rem;padding:3rem;text-align:center}

    /* ── FOOTER ── */
    .footer-bar{
      position:relative;z-index:1;max-width:860px;margin:0 auto;
      padding:1.5rem 1.5rem;border-top:1px solid rgba(255,255,255,.07);
      display:flex;justify-content:space-between;align-items:center;
      flex-wrap:wrap;gap:.75rem;font-size:.72rem;color:var(--muted);
    }
    .footer-links{display:flex;gap:1.25rem}
    .footer-links a{color:var(--muted);text-decoration:none;transition:color .2s}
    .footer-links a:hover{color:var(--em-l)}

    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(16,185,129,.28);border-radius:2px}

    @media(max-width:860px){
      .nav-links .nav-link span:not(.badge){display:none}
      .wz-grid{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:560px){
      .topnav{padding:0 1rem}
      .page{padding:1.5rem 1rem 4rem}
      .wz-grid{grid-template-columns:repeat(2,1fr)}
      .hero{padding:2.5rem 1rem 2rem}
      .dz-card{padding:2.5rem 1rem}
    }
      .logo-badge{display:inline-flex;align-items:baseline;gap:2px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:5px 12px 5px 10px;line-height:1;text-decoration:none}    .logo-w{font-size:18px;font-weight:900;color:#fff;letter-spacing:-1px}    .logo-job{font-size:12px;font-weight:700;color:#10b981;letter-spacing:2.5px}    [data-theme=light] .logo-badge{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35)}    [data-theme=light] .logo-w{color:#0f172a}

<!-- Particle canvas -->
<script>
(function(){
  var c=document.getElementById('hero-canvas');if(!c)return;
  var ctx=c.getContext('2d'),pts=[],N=55;
  var dpr=window.devicePixelRatio||1;
  function resize(){var w=c.offsetWidth,h=c.offsetHeight;c.width=w*dpr;c.height=h*dpr;ctx.scale(dpr,dpr);c.style.width=w+'px';c.style.height=h+'px'}
  function P(){this.r()}
  P.prototype.r=function(){this.x=Math.random()*c.width;this.y=Math.random()*c.height;this.vx=(Math.random()-.5)*.38;this.vy=(Math.random()-.5)*.38;this.rad=Math.random()*1.8+.4;this.a=Math.random()*.3+.06}
  P.prototype.u=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>c.width)this.vx*=-1;if(this.y<0||this.y>c.height)this.vy*=-1}
  P.prototype.d=function(){ctx.beginPath();ctx.arc(this.x,this.y,this.rad,0,Math.PI*2);ctx.fillStyle='rgba(16,185,129,'+this.a+')';ctx.fill()}
  function init(){pts=[];for(var i=0;i<N;i++)pts.push(new P())}
  function lines(){for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<125){ctx.beginPath();ctx.strokeStyle='rgba(16,185,129,'+(0.065*(1-d/125))+')';ctx.lineWidth=.6;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke()}}}
  function loop(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(function(p){p.u();p.d()});lines();requestAnimationFrame(loop)}
  new ResizeObserver(function(){resize();init()}).observe(c.parentElement);
  resize();init();loop();
  var s=document.createElement('style');s.textContent='@keyframes spinR{from{stroke-dashoffset:188}to{stroke-dashoffset:-188}}';document.head.appendChild(s);
})();
</script>

<!-- Wizard UI sync -->
<script>
document.addEventListener('DOMContentLoaded',function(){
  setTimeout(function(){
    var _orig=window.goToStep;
    window.goToStep=function(step){
      _orig&&_orig(step);
      // Step cards
      document.querySelectorAll('.wz-step-card').forEach(function(el){
        var s=parseInt(el.dataset.step);
        el.classList.remove('wz-active','wz-done');
        var numEl=document.getElementById('wz-num-'+s);
        if(numEl){
          var ni=numEl.querySelector('.wz-ni'),ck=numEl.querySelector('.wz-ck');
          if(s<step){el.classList.add('wz-done');if(ck)ck.style.display='block';if(ni)ni.style.display='none'}
          else{if(ck)ck.style.display='none';if(ni)ni.style.display='block'}
          if(s===step)el.classList.add('wz-active');
        }
      });
      // Progress bar
      var pct=[12,37,62,88][step-1]||12;
      var bar=document.getElementById('wz-bar-fill');if(bar)bar.style.width=pct+'%';
      // Ring sync
      var ab=document.getElementById('analysis-bar'),rf=document.getElementById('ring-fill-el');
      if(ab&&rf){var p=parseInt(ab.style.width)||0;rf.style.strokeDashoffset=188-(188*p/100)}
    };
  },120);
});
</script>

<!-- Theme toggle -->
<script>
const root=document.documentElement;
const saved=localStorage.getItem('wjob-theme')||'dark';
root.dataset.theme=saved;
function navBg(){
  const light=root.dataset.theme==='light',scrolled=window.scrollY>10;
  document.querySelector('.topnav').style.background=scrolled
    ?(light?'rgba(240,253,248,.97)':'rgba(3,13,18,.92)')
    :(light?'rgba(240,253,248,.9)':'rgba(3,13,18,.8)');
}
document.getElementById('themeToggle').addEventListener('click',()=>{
  const next=root.dataset.theme==='dark'?'light':'dark';
  const flash=document.getElementById('theme-flash');
  flash.className=next==='light'?'flash-light':'flash-dark';
  flash.addEventListener('animationend',()=>{flash.className='';},{once:true});
  root.dataset.theme=next;localStorage.setItem('wjob-theme',next);navBg();
});
window.addEventListener('scroll',navBg);
</script>
