    <div class="app-container">
        <main class="main-content">
            <header class="page-header fade-in">
                <h1 class="page-title">Recherche d'emplois</h1>
                <p class="page-subtitle">Découvrez les meilleures opportunités pour votre profil</p>
            </header>

            <div class="filters-container fade-in">
                <div class="filters-grid">
                    <div class="filter-group">
                        <label class="filter-label">Recherche</label>
                        <input type="text" class="filter-input" id="filter-search"
                            placeholder="Titre, entreprise, compétences...">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Localisation</label>
                        <select class="filter-select" id="filter-location">
                            <option value="">Toutes</option>
                            <option value="remote">Remote</option>
                            <option value="paris">Paris</option>
                            <option value="lyon">Lyon</option>
                            <option value="bordeaux">Bordeaux</option>
                            <option value="nantes">Nantes</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Contrat</label>
                        <select class="filter-select" id="filter-contract">
                            <option value="">Tous</option>
                            <option value="CDI">CDI</option>
                            <option value="CDD">CDD</option>
                            <option value="Freelance">Freelance</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Compatibilité</label>
                        <select class="filter-select" id="filter-compatibility">
                            <option value="0">Toutes</option>
                            <option value="90">90%+</option>
                            <option value="80">80%+</option>
                            <option value="70">70%+</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">&nbsp;</label>
                        <button class="btn btn-secondary" onclick="resetFilters()"
                            style="width: 100%;">Réinitialiser</button>
                    </div>
                </div>
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg);">
                <span style="color: var(--color-text-secondary); font-size: 0.9rem;">
                    <span id="results-count">0</span> offres trouvées
                </span>
                <select class="filter-select" id="sort-by" style="width: auto;">
                    <option value="compatibility">Compatibilité</option>
                    <option value="date">Date</option>
                    <option value="company">Entreprise</option>
                </select>
            </div>

            <div class="job-grid" id="job-grid"></div>

        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-job-title"></h2>
                <button class="modal-close" onclick="closeJobModal()">✕</button>
