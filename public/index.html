<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>W-JOB — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --em:#10b981;--em-l:#34d399;--em-d:#059669;--teal:#14b8a6;
      --bg:#030d12;
      --glass:rgba(255,255,255,.052);--gb:rgba(16,185,129,.16);--gh:rgba(255,255,255,.085);
      --text:#f0fdf8;--muted:#6b9e8e;--dim:#a3c4bc;
    }
    [data-theme="light"]{--bg:#f0fdf8;--glass:rgba(0,0,0,.04);--gb:rgba(16,185,129,.18);--gh:rgba(0,0,0,.06);--text:#0f172a;--muted:#4b7a6c;--dim:#2d5c4e}
    [data-theme="light"] body::before{background:radial-gradient(ellipse 60% 50% at 12% -5%,rgba(16,185,129,.09) 0%,transparent 55%),radial-gradient(ellipse 45% 40% at 88% 105%,rgba(20,184,166,.06) 0%,transparent 50%),linear-gradient(160deg,#f0fdf8 0%,#e5f7f0 100%)}
    [data-theme="light"] .topnav{background:rgba(240,253,248,.88);border-bottom-color:rgba(16,185,129,.22)}
    [data-theme="light"] .kpi-card,[data-theme="light"] .action-card,[data-theme="light"] .panel{background:rgba(255,255,255,.75);border-color:rgba(16,185,129,.22)}
    [data-theme="light"] .kpi-sub{border-top-color:rgba(0,0,0,.08)}
    [data-theme="light"] .nav-link{color:var(--dim)}
    [data-theme="light"] .nav-link:hover{background:rgba(0,0,0,.05);color:var(--text)}
    [data-theme="light"] .nav-link.active{color:var(--em);background:rgba(16,185,129,.1)}
    [data-theme="light"] .icon-btn{background:rgba(255,255,255,.6);border-color:rgba(16,185,129,.2)}
    [data-theme="light"] .act-text{color:var(--text)}
    [data-theme="light"] .app-role{color:var(--text)}
    [data-theme="light"] .panel-title{color:var(--text)}
    [data-theme="light"] .dist-label{color:var(--muted)}
    .icon-sun{display:block}.icon-moon{display:none}
    [data-theme="light"] .icon-sun{display:none}[data-theme="light"] .icon-moon{display:block}
    body{transition:background .45s ease,color .45s ease}
    .topnav{transition:background .45s ease,border-color .45s ease}
    .kpi-card,.action-card,.panel{transition:background .45s ease,border-color .45s ease,transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s}
    #theme-flash{position:fixed;inset:0;z-index:9999;pointer-events:none;background:rgba(255,255,255,0);transition:none}
    #theme-flash.flash-dark{background:rgba(0,0,0,.18);animation:flashOut .4s ease forwards}
    #theme-flash.flash-light{background:rgba(255,255,255,.22);animation:flashOut .4s ease forwards}
    @keyframes flashOut{0%{opacity:1}100%{opacity:0}}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 12% -5%,rgba(16,185,129,.14) 0%,transparent 55%),radial-gradient(ellipse 45% 40% at 88% 105%,rgba(20,184,166,.09) 0%,transparent 50%),linear-gradient(160deg,#030d12 0%,#071a20 100%)}
    .topnav{position:sticky;top:0;z-index:100;height:60px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;background:rgba(3,13,18,.8);backdrop-filter:blur(28px) saturate(1.5);border-bottom:1px solid rgba(16,185,129,.12)}
    .nav-logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;flex-shrink:0}
    .nav-logo-icon{width:32px;height:32px;flex-shrink:0}
    .nav-logo-text{font-size:1.2rem;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--em-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-links{display:flex;align-items:center;gap:.25rem;flex:1;justify-content:center}
    .nav-link{display:flex;align-items:center;gap:.45rem;padding:.42rem .85rem;border-radius:8px;font-size:.85rem;font-weight:500;color:var(--dim);text-decoration:none;transition:all .2s;white-space:nowrap}
    .nav-link svg{width:15px;height:15px;stroke-width:2;flex-shrink:0}
    .nav-link:hover{color:var(--text);background:var(--gh)}
    .nav-link.active{color:var(--em-l);background:rgba(16,185,129,.12)}
    .nav-link .badge{background:var(--em-d);color:#fff;font-size:.6rem;font-weight:700;padding:.1rem .42rem;border-radius:999px;line-height:1.4}
    .nav-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
    .icon-btn{width:36px;height:36px;border-radius:9px;background:var(--glass);border:1px solid var(--gb);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--dim);text-decoration:none}
    .icon-btn svg{width:16px;height:16px;stroke-width:1.8}
    .icon-btn:hover{background:var(--gh);color:var(--em-l);border-color:rgba(16,185,129,.35)}
    .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--em-d),var(--em));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 0 16px rgba(16,185,129,.32);transition:box-shadow .2s}
    .avatar:hover{box-shadow:0 0 28px rgba(16,185,129,.5)}
    .page{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:2rem 2rem 4rem}
    .fade-in{opacity:0;transform:translateY(16px);animation:fadeIn .55s cubic-bezier(.16,1,.3,1) forwards}
    .fi1{animation-delay:.05s}.fi2{animation-delay:.12s}.fi3{animation-delay:.2s}.fi4{animation-delay:.28s}.fi5{animation-delay:.36s}.fi6{animation-delay:.44s}.fi7{animation-delay:.52s}
    @keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
    .greeting{margin-bottom:2rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
    .greeting-left h2{font-size:1.7rem;font-weight:800;letter-spacing:-.5px}
    .greeting-left p{color:var(--muted);margin-top:.35rem;font-size:.85rem;display:flex;align-items:center;gap:.4rem}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:syncPulse 2s ease-out infinite}
    @keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}
    .greeting-date{font-size:.82rem;color:var(--muted);text-align:right}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.75rem}
    .kpi-card{background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1.25rem 1.5rem;backdrop-filter:blur(20px);position:relative;overflow:hidden}
    .kpi-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(16,185,129,.04) 0%,transparent 60%)}
    .kpi-card:hover{transform:translateY(-4px);box-shadow:0 16px 45px rgba(16,185,129,.14)}
    .kpi-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
    .kpi-icon{width:38px;height:38px;border-radius:10px;background:rgba(16,185,129,.14);border:1px solid rgba(16,185,129,.22);display:flex;align-items:center;justify-content:center;color:var(--em-l);transition:transform .3s}
    .kpi-icon svg{width:16px;height:16px;stroke-width:2}
    .kpi-card:hover .kpi-icon{transform:scale(1.12) rotate(-8deg)}
    .kpi-trend{font-size:.7rem;font-weight:600;padding:.18rem .5rem;border-radius:6px}
    .kpi-trend.up{background:rgba(16,185,129,.14);color:var(--em-l)}
    .kpi-trend.neutral{background:rgba(148,163,184,.1);color:var(--muted)}
    .kpi-value{font-size:2rem;font-weight:800;line-height:1;margin-bottom:.3rem;font-variant-numeric:tabular-nums}
    .kpi-label{font-size:.78rem;color:var(--muted);font-weight:500}
    .kpi-sub{font-size:.7rem;color:var(--muted);margin-top:.75rem;padding-top:.75rem;border-top:1px solid rgba(255,255,255,.055)}
    .action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.75rem}
    .action-card{background:var(--glass);border:1px solid var(--gb);border-radius:16px;padding:1.4rem;backdrop-filter:blur(20px);cursor:pointer;transition:all .32s cubic-bezier(.16,1,.3,1);text-decoration:none;color:var(--text);display:flex;align-items:center;gap:.9rem;position:relative;overflow:hidden}
    .action-card.primary{background:linear-gradient(135deg,rgba(16,185,129,.16),rgba(20,184,166,.08));border-color:rgba(16,185,129,.32)}
    .action-card::after{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transition:left .5s}
    .action-card:hover::after{left:130%}
    .action-card:hover{transform:translateY(-4px);box-shadow:0 18px 45px rgba(16,185,129,.14);border-color:rgba(16,185,129,.4)}
    .action-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0;background:rgba(16,185,129,.14);border:1px solid rgba(16,185,129,.22);display:flex;align-items:center;justify-content:center;color:var(--em-l);transition:transform .3s}
    .action-icon svg{width:20px;height:20px;stroke-width:1.8}
    .action-card:hover .action-icon{transform:scale(1.1) rotate(-6deg)}
    .action-text h3{font-size:.92rem;font-weight:700;margin-bottom:.2rem}
    .action-text p{font-size:.75rem;color:var(--muted)}
    .action-arrow{margin-left:auto;color:var(--em);opacity:0;transition:all .25s;transform:translateX(-4px);flex-shrink:0}
    .action-arrow svg{width:16px;height:16px;stroke-width:2.5}
    .action-card:hover .action-arrow{opacity:1;transform:translateX(0)}
    .bottom-grid{display:grid;grid-template-columns:1fr 340px;gap:1.5rem}
    .panel{background:var(--glass);border:1px solid var(--gb);border-radius:20px;padding:1.5rem;backdrop-filter:blur(20px)}
    .panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .panel-title{font-size:.92rem;font-weight:700}
    .panel-action{font-size:.78rem;color:var(--em);text-decoration:none;font-weight:600;transition:color .2s;display:flex;align-items:center;gap:.25rem}
    .panel-action:hover{color:var(--em-l)}
    .panel-action svg{width:13px;height:13px;stroke-width:2.5}
    .app-item{display:flex;align-items:center;gap:.85rem;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.045);transition:all .2s;border-radius:8px;cursor:pointer}
    .app-item:last-child{border-bottom:none;padding-bottom:0}
    .app-item:hover{background:rgba(255,255,255,.028);padding-left:.5rem;padding-right:.5rem;margin:0 -.5rem}
    .app-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(20,184,166,.12));border:1px solid rgba(16,185,129,.2);display:flex;align-items:center;justify-content:center;color:var(--em-l);flex-shrink:0;transition:transform .2s;font-size:.75rem;font-weight:700}
    .app-logo svg{width:17px;height:17px;stroke-width:1.8}
    .app-item:hover .app-logo{transform:scale(1.08)}
    .app-info{flex:1;min-width:0}
    .app-role{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .app-company{font-size:.73rem;color:var(--muted);margin-top:.1rem}
    .app-status{font-size:.67rem;font-weight:700;padding:.2rem .55rem;border-radius:6px;flex-shrink:0}
    .s-sent{background:rgba(16,185,129,.14);color:var(--em-l)}
    .s-pending{background:rgba(234,179,8,.12);color:#fbbf24}
    .s-responded,.s-response{background:rgba(59,130,246,.14);color:#93c5fd}
    .s-draft{background:rgba(148,163,184,.1);color:var(--muted)}
    .activity-item{display:flex;gap:.75rem;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .activity-item:last-child{border-bottom:none}
    .act-dot{width:8px;height:8px;border-radius:50%;background:var(--em);margin-top:4px;flex-shrink:0}
    .act-text{font-size:.8rem;color:var(--dim);line-height:1.55}
    .act-time{font-size:.68rem;color:var(--muted);margin-top:.12rem}
    .dist-item{margin-bottom:.9rem}
    .dist-item:last-child{margin-bottom:0}
    .dist-header{display:flex;justify-content:space-between;margin-bottom:.38rem}
    .dist-label{font-size:.8rem;color:var(--dim);font-weight:500}
    .dist-count{font-size:.8rem;font-weight:700}
    .dist-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
    .dist-fill{height:100%;border-radius:3px;width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
    .f-em{background:linear-gradient(90deg,var(--em-d),var(--em-l))}
    .f-yw{background:linear-gradient(90deg,#d97706,#fbbf24)}
    .f-bl{background:linear-gradient(90deg,#2563eb,#93c5fd)}
    .f-gr{background:linear-gradient(90deg,#374151,#6b7280)}
    .realtime{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--em);font-weight:600;margin-top:1.1rem}
    .rt-dot{width:5px;height:5px;border-radius:50%;background:var(--em);animation:syncPulse 2s ease-out infinite}
    .empty-msg{text-align:center;padding:1.5rem;color:var(--muted);font-size:.82rem}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(16,185,129,.3);border-radius:2px}
    @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.bottom-grid{grid-template-columns:1fr}.nav-links .nav-link span{display:none}}
    @media(max-width:600px){.topnav{padding:0 1rem}.action-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}}
      .logo-badge{display:inline-flex;align-items:baseline;gap:2px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:5px 12px 5px 10px;line-height:1;text-decoration:none}    .logo-w{font-size:18px;font-weight:900;color:#fff;letter-spacing:-1px}    .logo-job{font-size:12px;font-weight:700;color:#10b981;letter-spacing:2.5px}    [data-theme=light] .logo-badge{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35)}    [data-theme=light] .logo-w{color:#0f172a}
</head>

  <div class="page">
    <div class="greeting fade-in fi1">
      <div class="greeting-left">
        <h2 id="greeting-text">Bonjour</h2>
        <p><span class="sync-dot"></span> <span id="sync-text">Chargement…</span></p>
      </div>
      <div class="greeting-date" id="greeting-date"></div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card fade-in fi2">
        <div class="kpi-header">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>

        <div class="kpi-sub">Mises à jour en temps réel</div>
      </div>
      <div class="kpi-card fade-in fi3">
        <div class="kpi-header">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
          <span class="kpi-trend up" id="trend-apps">+0</span>
        </div>
        <div class="kpi-value" id="kpi-apps">0</div>
        <div class="kpi-label">Candidatures</div>
        <div class="kpi-sub" id="kpi-apps-sub">—</div>
      </div>
      <div class="kpi-card fade-in fi4">
        <div class="kpi-header">
          <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>

  <script>
    lucide.createIcons();
    const h = new Date().getHours();
    document.getElementById('greeting-text').textContent = h < 12 ? 'Bonjour' : h < 18 ? 'Bon après-midi' : 'Bonsoir';
    document.getElementById('greeting-date').textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    const root = document.documentElement;
    root.dataset.theme = localStorage.getItem('wjob-theme') || 'dark';
    document.getElementById('themeToggle').addEventListener('click',()=>{
      const next = root.dataset.theme==='dark'?'light':'dark';
      const flash = document.getElementById('theme-flash');
      flash.className = next==='light'?'flash-light':'flash-dark';
      flash.addEventListener('animationend',()=>{flash.className='';},{once:true});
      root.dataset.theme = next;
      localStorage.setItem('wjob-theme',next);
    });
    document.getElementById('user-avatar').addEventListener('click',async()=>{
      if(confirm('Se déconnecter ?')){
        try{await API.logout();}catch(e){}
        window.location.href='login.html';
      }
    });
    window.addEventListener('scroll',()=>{
      const light=root.dataset.theme==='light',sc=window.scrollY>10;
      document.querySelector('.topnav').style.background=sc?(light?'rgba(240,253,248,.96)':'rgba(3,13,18,.9)'):(light?'rgba(240,253,248,.88)':'rgba(3,13,18,.75)');
    });
  </script>
