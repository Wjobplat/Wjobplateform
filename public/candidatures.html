    <div class="app-container">
        <main class="main-content">
            <header class="page-header fade-in">
                <h1 class="page-title">Mes candidatures</h1>
                <p class="page-subtitle">Suivez l'état de vos demandes d'emploi en temps réel</p>
            </header>

            <!-- Animated Status Tabs -->
            <div class="animated-tabs fade-in" id="tabs-container">
                <div class="animated-tab-indicator" id="tab-indicator"></div>
                <button class="animated-tab active" data-status="all" onclick="filterByStatus('all', this)">
                    Tout <span class="animated-tab-count" id="count-all">0</span>
                </button>
                <button class="animated-tab" data-status="draft" onclick="filterByStatus('draft', this)">
                    Brouillons <span class="animated-tab-count" id="count-draft">0</span>
                </button>
                <button class="animated-tab" data-status="pending" onclick="filterByStatus('pending', this)">
                    En attente <span class="animated-tab-count" id="count-pending">0</span>
                </button>
                <button class="animated-tab" data-status="sent" onclick="filterByStatus('sent', this)">
                    Envoyées <span class="animated-tab-count" id="count-sent">0</span>
                </button>
                <button class="animated-tab" data-status="responded" onclick="filterByStatus('responded', this)">
                    Réponses <span class="animated-tab-count" id="count-responded">0</span>
                </button>
            </div>

            <div id="applications-container" class="fade-in">
                <div style="text-align: center; padding: var(--space-2xl); color: var(--color-text-muted);">
